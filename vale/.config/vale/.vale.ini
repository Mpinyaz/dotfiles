# Global Vale Configuration
StylesPath = .vale/styles
MinAlertLevel = suggestion

# List of styles to use (we'll sync these in step 3)
Packages = Google, proselint, write-good

[*{.txt,.tex}]
BasedOnStyles = Vale, Google, proselint, write-good

# Optional: Ignore certain syntax (like LaTeX commands)
TokenIgnores = (\$+[^\n$]+\$+)
